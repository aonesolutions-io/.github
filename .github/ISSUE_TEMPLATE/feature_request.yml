name: Feature Request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

  - type: dropdown
    id: repository
    attributes:
      label: Repository
      options:
        - backend
        - customer-app
        - driver-app
        - fleet-app
        - admin-panel
        - website
        - shared-sdk
        - shared-types
        - infrastructure
        - docs
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Expected Business Impact

  - type: checkboxes
    id: checklist
    attributes:
      label: Confirmation
      options:
        - label: I searched existing feature requests.
          required: true
