name: Bug Report
description: Report a reproducible bug or unexpected behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        ## Before submitting

        - Search existing issues.
        - Ensure this is reproducible.
        - Include as much detail as possible.

  - type: dropdown
    id: repository
    attributes:
      label: Repository
      options:
        - backend
        - customer-app
        - driver-app
        - fleet-app
        - admin-panel
        - website
        - shared-sdk
        - shared-types
        - infrastructure
        - docs
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: e.g. main, develop, commit SHA
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      placeholder: Describe the issue.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched for existing issues.
          required: true
        - label: I can reproduce this issue.
          required: true
